<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin — ISA Telephony</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="styles/admin.css" />
</head>

<body>
    <div class="admin-wrap" id="admin-root">
        <div class="admin-header">
            <h1>Admin Panel <span class="role-badge">Admin</span></h1>
            <button class="logout-btn" id="logout-btn">Log out</button>
        </div>

        <div class="stats-row">
            <div class="stat-card">
                <div class="num" id="total-users">—</div>
                <div class="desc">Total Users</div>
            </div>
            <div class="stat-card">
                <div class="num" id="users-at-limit">—</div>
                <div class="desc">Users at API Limit</div>
            </div>
        </div>

        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Email</th>
                        <th>API Calls</th>
                        <th>Role</th>
                        <th>Joined</th>
                        <th>Usage</th>
                    </tr>
                </thead>
                <tbody id="users-tbody">
                    <tr>
                        <td colspan="6" style="color:var(--muted); text-align:center; padding:24px;">Loading...</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <p id="admin-error"></p>
    </div>

    <script src="client.js"></script>
</body>

</html>
