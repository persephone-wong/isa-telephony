<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <main class="login-card" aria-labelledby="login-title">
        <h1 id="login-title">Welcome</h1>
        <p class="subtitle">Sign in to continue.</p>

        <form id="login-form">
            <div class="field">
                <label for="email">Email</label>
                <input id="email" name="email" type="email" required />
            </div>

            <div class="field">
                <label for="password">Password</label>
                <input id="password" name="password" type="password" required minlength="6" />
            </div>

            <div class="actions">
                <label class="remember" for="remember-me">
                    <input id="remember-me" name="rememberMe" type="checkbox" />
                    Remember me
                </label>
                <span>Forgot password?</span>
            </div>

            <button type="submit">Log In</button>
        </form>

        <a class="page-link" href="register.html">Need an account? Register</a>

        <p id="form-message" class="message" aria-live="polite"></p>
    </main>

    <script src="client.js"></script>
</body>
</html>
