<!doctype html>
<html>
  <head>
    <title>Live Transcript</title>
    <style>
      body {
        font-family: Arial;
        background: #f5f5f5;
      }

      #transcript {
        max-width: 600px;
        margin: auto;
        padding: 20px;
        height: 80vh;
        overflow-y: auto;
        background: white;
        border-radius: 8px;
      }

      .message {
        margin-bottom: 12px;
      }

      .user {
        text-align: right;
        background: #d1e7ff;
        padding: 8px;
        border-radius: 8px;
        margin-bottom: 4px;
      }

      .ai {
        text-align: left;
        background: #e8e8e8;
        padding: 8px;
        border-radius: 8px;
      }
    </style>
  </head>

  <body>
    <h2 style="text-align: center">Live Call Transcript</h2>
    <div id="transcript"></div>

    <script src="transcript.js"></script>
  </body>
</html>
